<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prueba — Módulo Salto</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; padding: 40px 20px; }
    .card { background: #fff; border-radius: 12px; padding: 32px; max-width: 500px; width: 100%; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    h1 { font-size: 1.4em; margin-bottom: 24px; text-align: center; }
    label { display: block; font-weight: bold; margin-bottom: 6px; margin-top: 16px; }
    input[type="file"], select, input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1em; }
    button { margin-top: 24px; width: 100%; padding: 12px; background: #2563eb; color: #fff; border: none; border-radius: 6px; font-size: 1.1em; cursor: pointer; }
    button:disabled { background: #93c5fd; cursor: wait; }
    button:hover:not(:disabled) { background: #1d4ed8; }
    #resultado { margin-top: 24px; padding: 16px; border-radius: 8px; display: none; }
    #resultado.ok { background: #d1fae5; border: 1px solid #6ee7b7; display: block; }
    #resultado.error { background: #fee2e2; border: 1px solid #fca5a5; display: block; }
    .dato { margin: 4px 0; }
    .dato strong { display: inline-block; width: 140px; }
    .valor-grande { font-size: 2em; font-weight: bold; color: #2563eb; text-align: center; margin: 12px 0; }
    .nota { margin-top: 16px; font-size: 0.85em; color: #888; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Módulo Salto — Prueba de backend</h1>

    <label for="video">Vídeo del salto</label>
    <input type="file" id="video" accept="video/mp4,video/webm,video/avi,video/quicktime" />

    <label for="tipo">Tipo de salto</label>
    <select id="tipo">
      <option value="vertical">Vertical</option>
      <option value="horizontal">Horizontal</option>
    </select>

    <label for="altura">Altura real del usuario (metros)</label>
    <input type="number" id="altura" step="0.01" min="0.5" max="2.5" placeholder="1.75" required />

    <button id="btn" onclick="enviar()">Analizar salto</button>

    <div id="resultado"></div>

    <p class="nota">⚠ Página de prueba temporal — borrar tras validar el backend</p>
  </div>

  <script>
    const API_URL = "http://localhost:5001/api/salto/calcular";

    async function enviar() {
      const video = document.getElementById("video").files[0];
      const tipo = document.getElementById("tipo").value;
      const altura = document.getElementById("altura").value;
      const btn = document.getElementById("btn");
      const res = document.getElementById("resultado");

      if (!video) {
        res.className = "error";
        res.innerHTML = "Selecciona un vídeo primero.";
        return;
      }

      if (!altura) {
        res.className = "error";
        res.innerHTML = "Introduce tu altura (necesaria para calibrar el cálculo).";
        return;
      }

      const form = new FormData();
      form.append("video", video);
      form.append("tipo_salto", tipo);
      form.append("altura_real_m", altura);

      btn.disabled = true;
      btn.textContent = "Procesando vídeo…";
      res.className = "";
      res.removeAttribute("style");

      try {
        const resp = await fetch(API_URL, { method: "POST", body: form });
        const data = await resp.json();

        if (data.error) {
          res.className = "error";
          res.innerHTML = `<strong>Error:</strong> ${data.error}`;
        } else {
          res.className = "ok";
          res.innerHTML = `
            <div class="valor-grande">${data.distancia} ${data.unidad}</div>
            <div class="dato"><strong>Tipo de salto:</strong> ${data.tipo_salto}</div>
            <div class="dato"><strong>Confianza:</strong> ${(data.confianza * 100).toFixed(0)}%</div>
            <div class="dato"><strong>Frame despegue:</strong> ${data.frame_despegue ?? "—"}</div>
            <div class="dato"><strong>Frame aterrizaje:</strong> ${data.frame_aterrizaje ?? "—"}</div>
            <div class="dato"><strong>Tiempo vuelo:</strong> ${data.tiempo_vuelo_s ?? "—"} s</div>
            ${data.metodo ? `<div class="dato"><strong>Método:</strong> ${data.metodo}</div>` : ""}
            ${data.dist_por_pixeles != null ? `<div class="dato"><strong>Por píxeles:</strong> ${data.dist_por_pixeles} cm</div>` : ""}
            ${data.dist_por_cinematica != null ? `<div class="dato"><strong>Por cinemática:</strong> ${data.dist_por_cinematica} cm</div>` : ""}
          `;
        }
      } catch (e) {
        res.className = "error";
        res.innerHTML = "No se pudo conectar con el backend. ¿Está corriendo en puerto 5001?";
      } finally {
        btn.disabled = false;
        btn.textContent = "Analizar salto";
      }
    }
  </script>
</body>
</html>
