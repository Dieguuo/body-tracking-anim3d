<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medición de Salto</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="salto-page">
    <header class="top-bar">
        <a href="index.html" class="back-button"><span class="arrow">←</span> Volver</a>
        <h1 class="header-title">Analizador de Salto</h1>
    </header>

    <main class="camera-wrapper">
        <video id="vista-camara" autoplay playsinline muted></video>
    </main>
        
    <section class="camera-hud">
        <div class="config-panel">
            <select id="tipo-salto" class="modern-input">
                <option value="horizontal">Salto Horizontal</option>
                <option value="vertical">Salto Vertical</option>
            </select>
            <input type="number" id="altura-usuario" class="modern-input" placeholder="Altura (ej: 1.75)" step="0.01">
        </div>

        <div class="controls">
            <button id="btn-grabar" class="record-btn">
                <span class="record-icon"></span>
                <span id="btn-text">Grabar Salto</span>
            </button>
            
            <div class="upload-container">
                <span class="divider">o</span>
                <div class="upload-btn-visual" id="label-visual">Subir vídeo de la galería</div>
                <input type="file" id="input-archivo-final" accept="video/mp4,video/webm,video/quicktime,video/*" class="input-transparente">
            </div>
        </div>
    </section>

    <div id="panel-resultados" class="results-sheet">
        <div class="results-content">
            <h2 id="distancia-resultado">-- cm</h2>
            <p id="tipo-resultado" class="results-subtitle">Análisis completado</p>
            
            <div class="technical-data-grid">
                <div class="data-box">
                    <span class="data-label">Confianza</span>
                    <span id="data-confianza" class="data-value">--</span>
                </div>
                <div class="data-box">
                    <span class="data-label">Tiempo Vuelo</span>
                    <span id="data-tiempo" class="data-value">-- s</span>
                </div>
                <div class="data-box">
                    <span class="data-label">F. Despegue</span>
                    <span id="data-despegue" class="data-value">--</span>
                </div>
                <div class="data-box">
                    <span class="data-label">F. Aterrizaje</span>
                    <span id="data-aterrizaje" class="data-value">--</span>
                </div>
            </div>

            <button id="btn-reintentar" class="primary-btn-large">Nuevo Salto</button>
        </div>
    </div>

    <script src="js/camara.js"></script>
    <script src="js/api_salto.js"></script>
</body>
</html>
