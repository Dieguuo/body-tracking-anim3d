<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medición de Salto</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="salto-page">
    <header class="top-bar">
        <a href="index.html" class="back-button">← Volver</a>
        <h1>Analizador de Salto</h1>
    </header>

    <main class="camera-container">
        <video id="vista-camara" autoplay playsinline muted></video>
        
        <div class="camera-hud">
            <div class="config-panel">
                <select id="tipo-salto" class="modern-input">
                    <option value="horizontal">Salto Horizontal</option>
                    <option value="vertical">Salto Vertical</option>
                </select>
                <input type="number" id="altura-usuario" class="modern-input" placeholder="Tu altura (ej: 1.75)" step="0.01">
            </div>

            <div class="controls">
                <button id="btn-grabar" class="record-btn">
                    <span class="record-icon"></span>
                    <span id="btn-text">Grabar</span>
                </button>
                
                <div class="upload-container">
                    <span class="divider">o</span>
                    
                    <div class="upload-btn" id="label-visual">
                        Subir vídeo
                    </div>
                    
                    <input type="file" id="input-archivo-final" accept="video/mp4,video/webm,video/quicktime,video/*" class="input-transparente">
                </div>
            </div>
        </div>
    </main>

    <section id="panel-resultados" class="results-card hidden">
        <h2 id="distancia-resultado">-- cm</h2>
        <p id="tipo-resultado">Esperando análisis...</p>
        <p id="confianza-resultado"></p>
        <button id="btn-reintentar" class="secondary-btn">Nuevo Salto</button>
    </section>

    <script src="js/camara.js"></script>
    <script src="js/api_salto.js"></script>
</body>

</html>
